AWSTemplateFormatVersion: "2010-09-09"
Description: "Border Checker read/check and optional remediation role for S3 bucket review."

Parameters:
  BorderCheckerAwsPrincipalArn:
    Type: String
    Description: "AWS principal ARN used by the Border Checker backend to assume this role."
  ExternalId:
    Type: String
    NoEcho: true
    Description: "ExternalId generated by Border Checker for this connection."
  EnableRemediation:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Allow Border Checker to apply recommended S3 settings."
  DemoBucketArn:
    Type: String
    Description: "S3 bucket ARN scope to review, for example arn:aws:s3:::your-bucket. Use wildcard only for controlled demos."

Conditions:
  EnableRemediationPermissions: !Equals [!Ref EnableRemediation, "true"]

Resources:
  BorderCheckerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "BorderCheckerRole-${AWS::StackName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Ref BorderCheckerAwsPrincipalArn
            Action: "sts:AssumeRole"
            Condition:
              StringEquals:
                "sts:ExternalId": !Ref ExternalId
      Policies:
        - PolicyName: BorderCheckerS3ReviewPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: CallerIdentity
                Effect: Allow
                Action:
                  - "sts:GetCallerIdentity"
                Resource: "*"
              - Sid: S3ReadBucketConfiguration
                Effect: Allow
                Action:
                  - "s3:GetBucketLocation"
                  - "s3:GetBucketEncryption"
                  - "s3:GetBucketTagging"
                  - "s3:GetBucketPolicy"
                  - "s3:GetBucketPublicAccessBlock"
                Resource:
                  - !Ref DemoBucketArn
                  - !Sub "${DemoBucketArn}/*"
              - !If
                - EnableRemediationPermissions
                - Sid: S3ApplyRecommendedSettings
                  Effect: Allow
                  Action:
                    - "s3:PutBucketTagging"
                    - "s3:PutBucketEncryption"
                    - "s3:PutBucketPolicy"
                    - "s3:PutBucketPublicAccessBlock"
                  Resource:
                    - !Ref DemoBucketArn
                    - !Sub "${DemoBucketArn}/*"
                - !Ref AWS::NoValue

Outputs:
  RoleArn:
    Description: "Paste this Role ARN back into Border Checker."
    Value: !GetAtt BorderCheckerRole.Arn
